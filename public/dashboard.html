<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — TaskForge</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <button class="mobile-toggle" id="mobileToggle">☰</button>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo"><h2>⚡ TaskForge</h2><span>Team Task Manager</span></div>
      <ul class="nav-menu">
        <li class="nav-item"><a href="/dashboard.html" class="nav-link"><span class="icon">📊</span>Dashboard</a></li>
        <li class="nav-item"><a href="/projects.html" class="nav-link"><span class="icon">📁</span>Projects</a></li>
        <li class="nav-item"><a href="/tasks.html" class="nav-link"><span class="icon">✅</span>Tasks</a></li>
      </ul>
      <div class="sidebar-footer">
        <div class="user-info" id="sidebarUser"></div>
        <button class="btn-logout" id="logoutBtn">🚪 Sign Out</button>
      </div>
    </aside>
    <main class="main-content">
      <div class="page-header">
        <div><h1>Dashboard</h1><p>Welcome back! Here's your overview.</p></div>
      </div>
      <div id="statsGrid" class="stats-grid"></div>
      <div class="grid-2">
        <div class="card">
          <div class="card-header"><h3>⚠️ Overdue Tasks</h3><span class="task-count" id="overdueCount">0</span></div>
          <div id="overdueList"></div>
        </div>
        <div class="card">
          <div class="card-header"><h3>⏰ Due Soon</h3><span class="task-count" id="dueSoonCount">0</span></div>
          <div id="dueSoonList"></div>
        </div>
      </div>
      <div class="card" style="margin-top:24px">
        <div class="card-header"><h3>📁 Project Progress</h3></div>
        <div id="projectProgress"></div>
      </div>
      <div class="card" style="margin-top:24px">
        <div class="card-header"><h3>🕐 Recent Tasks</h3></div>
        <div id="recentTasks"></div>
      </div>
    </main>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
